apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr
  namespace: argocd
spec:
  project: seerr
  sources:
    - repoURL: https://github.com/seerr-team/seerr.git
      targetRevision: develop
      path: charts/seerr-chart
      helm:
        values: |
          fullnameOverride: seerr
          config:
            persistence:
              existingClaim: seerr-config
    - repoURL: https://github.com/lemisieur-services/homelab.git
      targetRevision: main
      path: k8s/seerr
  destination:
    server: https://kubernetes.default.svc
    namespace: seerr
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
