apiVersion: v1
kind: Service
metadata:
  name: pve-01
  namespace: traefik
spec:
  type: ExternalName
  externalName: pve-01.ip.lab.lemisieur.com
  ports:
  - port: 8006
    targetPort: 8006
---
apiVersion: v1
kind: Service
metadata:
  name: pve-02
  namespace: traefik
spec:
  type: ExternalName
  externalName: pve-02.ip.lab.lemisieur.com
  ports:
  - port: 8006
    targetPort: 8006
---
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: pve-transport
  namespace: traefik
spec:
  insecureSkipVerify: true
---
# TraefikService with sticky sessions ensures the PVE console ticket (which is
# node-specific) is always validated by the same backend that issued it.
apiVersion: traefik.io/v1alpha1
kind: TraefikService
metadata:
  name: pve-lb
  namespace: traefik
spec:
  weighted:
    sticky:
      cookie:
        name: _pve_node
        secure: true
        httpOnly: true
    services:
    - name: pve-01
      port: 8006
      scheme: https
      serversTransport: pve-transport
      weight: 1
    - name: pve-02
      port: 8006
      scheme: https
      serversTransport: pve-transport
      weight: 1
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: pve
  namespace: traefik
spec:
  entryPoints:
  - websecure
  tls:
    secretName: lab-lemisieur-com
  routes:
  - kind: Rule
    match: Host(`pve.k8s.lab.lemisieur.com`) || Host(`pve.lab.lemisieur.com`)
    services:
    - name: pve-lb
      kind: TraefikService