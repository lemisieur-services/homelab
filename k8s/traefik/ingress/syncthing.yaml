apiVersion: v1
kind: Service
metadata:
  name: syncthing
  namespace: traefik
spec:
  type: ExternalName
  externalName: syncthing-01.ip.lab.lemisieur.com
  ports:
  - port: 8384
    targetPort: 8384
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: syncthing
  namespace: traefik
spec:
  entryPoints:
  - websecure
  tls:
    secretName: lab-lemisieur-com
  routes:
  - kind: Rule
    match: Host(`syncthing.lab.lemisieur.com`)
    services:
    - name: syncthing
      port: 8384
      scheme: http
      passHostHeader: true
      weight: 100
