apiVersion: v1
kind: Service
metadata:
  name: dns-02
  namespace: traefik
spec:
  type: ExternalName
  externalName: dns-02.ip.lab.lemisieur.com
  ports:
  - port: 5380
    targetPort: 5380
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: dns-02
  namespace: traefik
spec:
  entryPoints:
  - websecure
  tls:
    secretName: lab-lemisieur-com
  routes:
  - kind: Rule
    match: Host(`dns-02.lab.lemisieur.com`)
    services:
    - name: dns-02
      port: 5380
      scheme: http
      passHostHeader: true
      weight: 5380